<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>32通道电压监测</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            color-scheme: light dark;
            font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #f4f6fb;
            color: #1b1f29;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .page {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: clamp(0.75rem, 3vw, 1.5rem);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .view-modes {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            margin: 0;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #1d8cf8, #3358f4);
            color: #fff;
            font-weight: 500;
            transition: transform 0.15s ease, opacity 0.15s ease;
            min-width: 120px;
        }

        button.secondary {
            background: linear-gradient(135deg, #f87575, #ff5e5e);
        }

        button.view-mode-btn {
            padding: 0.5rem 1rem;
            min-width: auto;
            background: rgba(30, 44, 86, 0.1);
            color: #3358f4;
        }

        button.view-mode-btn.active {
            background: linear-gradient(135deg, #1d8cf8, #3358f4);
            color: white;
        }

        button.view-mode-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .status-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 20px 40px -30px rgba(31, 50, 103, 0.45);
            backdrop-filter: blur(6px);
            margin-bottom: 1rem;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .status-header span {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
        }

        .dot {
            width: 0.65rem;
            height: 0.65rem;
            border-radius: 50%;
            background-color: #c5c5d3;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .dot.online {
            background-color: #1ec65d;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .metric-item {
            background: rgba(30, 44, 86, 0.05);
            border-radius: 12px;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .metric-item span {
            font-size: 0.8rem;
            color: #5a6172;
        }

        .metric-item strong {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .charts-container {
            display: grid;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .chart-wrapper {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 20px 40px -30px rgba(31, 50, 103, 0.45);
            position: relative;
            height: 300px;
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #3358f4;
        }

        .log {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #555a68;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 12px;
            padding: 0.75rem;
            max-height: 150px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 1px rgba(30, 44, 86, 0.04);
        }

        .log p {
            margin: 0 0 0.25rem;
            white-space: pre-wrap;
            font-size: 0.8rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #6b7284;
            padding: 1rem 0;
        }

        .hidden {
            display: none !important;
        }

        .sampling-hint {
            margin: 0 0 1rem;
            padding: 0.6rem 0.9rem;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #7a6200;
            background: rgba(255, 209, 102, 0.2);
            border: 1px solid rgba(255, 209, 102, 0.5);
            line-height: 1.5;
        }

        @media (prefers-color-scheme: dark) {
            .sampling-hint {
                color: #ffd166;
                background: rgba(255, 209, 102, 0.08);
                border-color: rgba(255, 209, 102, 0.25);
            }
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }

            .chart-wrapper {
                height: 250px;
            }

            .metrics-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                max-height: 150px;
            }

            button {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
                min-width: 100px;
            }
        }

        @media (prefers-color-scheme: dark) {
            :root {
                background-color: #0f1729;
                color: #eef2ff;
            }

            .status-card,
            .chart-wrapper,
            .log {
                background: rgba(12, 21, 39, 0.85);
                color: inherit;
                box-shadow: 0 20px 40px -30px rgba(0, 0, 0, 0.6);
            }

            .metric-item {
                background: rgba(255, 255, 255, 0.05);
            }

            .metric-item span {
                color: #a8b0c7;
            }

            .log {
                color: #a0abc6;
            }

            button {
                background: linear-gradient(135deg, #3358f4, #1d8cf8);
            }

            button.secondary {
                background: linear-gradient(135deg, #ff5e5e, #f87575);
            }

            button.view-mode-btn {
                background: rgba(255, 255, 255, 0.1);
                color: #a8b0c7;
            }

            button.view-mode-btn.active {
                background: linear-gradient(135deg, #3358f4, #1d8cf8);
                color: white;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <h1>32通道ADC电压监测</h1>
            <div class="actions">
                <button id="exportBtn" disabled>导出数据</button>
                <button id="pauseBtn" class="secondary">暂停采样</button>
                <button id="clearBtn" class="secondary">清除缓存</button>
                <button id="connectBtn">连接蓝牙</button>
            </div>
        </header>

        <div class="view-modes">
            <button class="view-mode-btn active" data-mode="single">单通道显示</button>
            <button class="view-mode-btn" data-mode="group4">4通道一组</button>
            <button class="view-mode-btn" data-mode="group8">8通道一组</button>
            <button id="samplingModeBtn" class="view-mode-btn">采样模式</button>
        </div>

        <section class="status-card">
            <div class="status-header">
                <span><span class="dot" id="statusDot"></span><span id="statusText">等待连接</span></span>
                <span id="timer">--:--</span>
            </div>
            <div class="metrics-grid" id="voltageMetrics">
                <!-- 32个通道的电压值会动态生成 -->
            </div>
        </section>

        <div class="charts-container" id="chartsContainer">
            <!-- 图表会根据显示模式动态生成 -->
        </div>

        <p id="samplingHint" class="sampling-hint hidden">
            ⚠️ 采样时间越长，导出数据花费的时间越长。若点击导出后出现页面无响应，请耐心等待，导出完成后页面将自动恢复。
        </p>

        <section class="log" id="log"></section>
    </div>

    <footer>
        ⚠️ 使用 Web Bluetooth 时,请使用支持该功能的浏览器(Chrome / Edge / Android WebView) 等。iOS 需使用支持 Web Bluetooth 的浏览器(Bluefy)。
    </footer>

    <script>
        // 蓝牙UUID配置
        const SERVICE_UUID = 0x4321;
        const PRIMARY_SERVICE = BluetoothUUID.getService(SERVICE_UUID);
        const WRITE_CHAR_UUID = 0x4323;
        const NOTIFY_CHAR_UUID = 0x4324;
        const WRITE_CHAR = BluetoothUUID.getCharacteristic(WRITE_CHAR_UUID);
        const NOTIFY_CHAR = BluetoothUUID.getCharacteristic(NOTIFY_CHAR_UUID);

        // 时间配置
        // 图表模式：只保留最近60秒数据，不额外缓存
        const DISPLAY_WINDOW_MS = 60 * 1000;
        // 采样模式：最多采样5分钟，到时自动停止
        const SAMPLING_MAX_MS = 5 * 60 * 1000;
        const EXPECTED_INTERVAL_MS = 100;

        // DOM元素
        const logElement = document.getElementById('log');
        const connectBtn = document.getElementById('connectBtn');
        const exportBtn = document.getElementById('exportBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const voltageMetrics = document.getElementById('voltageMetrics');
        const timerDisplay = document.getElementById('timer');
        const chartsContainer = document.getElementById('chartsContainer');
        const samplingHint = document.getElementById('samplingHint');
        const viewModeBtns = document.querySelectorAll('.view-mode-btn:not(#samplingModeBtn)'); // 三个显示模式按钮
        const samplingModeBtn = document.getElementById('samplingModeBtn');

        // 全局变量
        let device;
        let notifyCharacteristic;
        let writeCharacteristic;
        let charts = [];
        let lastUpdate = 0;
        let startTime = null;
        let currentViewMode = 'single';
        let isPaused = true;           // 初始为暂停状态，等待手动恢复
        let samplingModeActive = false; // 采样模式标志
        let samplingStartTime = null;   // 采样模式开始时间（用于5分钟上限计算）

        // 32个通道的数据存储
        const channelData = Array(32).fill().map(() => []);

        // 性能优化：渲染解耦相关变量
        let renderLoopId = null;           // UI渲染定时器
        let timerIntervalId = null;        // 计时器（改为1Hz，不再用60fps rAF）
        let keepAliveId = null;            // BLE心跳定时器
        let lastCleanupTime = 0;           // 上次清理旧数据的时间
        let lastSampleRateLogTime = 0;     // 上次输出采样率日志的时间
        const sampleTimestamps = [];       // 滑动窗口：记录最近N次收包时间，用于精确采样率计算
        const SAMPLE_RATE_WINDOW = 60;     // 滑动窗口大小
        const RENDER_INTERVAL_MS = 100;    // UI刷新间隔 10Hz
        const CLEANUP_INTERVAL_MS = 5000;  // 清理旧数据间隔 5秒
        const SAMPLE_LOG_INTERVAL_MS = 3000; // 采样率日志间隔 3秒
        // ── BLE Keep-alive 配置 ──────────────────────────────────────────────
        // 原理：BLE连接建立后，Android/iOS 电源管理会在数秒内将连接间隔从
        // 7.5ms（高性能）自动扩展到 ≥85ms（省电），导致采样率从 20Hz 降至 12Hz。
        // 该过程与 JS 渲染无关，在采样模式下同样会发生。
        // 解决：每隔 500ms 向 writeCharacteristic 发一次 1 字节心跳写操作，
        // 维持双向 BLE 流量，使 OS 保持短连接间隔（高性能模式）。
        const KEEP_ALIVE_INTERVAL_MS = 500;
        const KEEP_ALIVE_PAYLOAD = new Uint8Array([0x00]); // 1字节心跳包
        const channelColors = [
            '#3358f4', '#ff6b6b', '#1ec65d', '#ffd166',
            '#06d6a0', '#118ab2', '#ef476f', '#7209b7',
            '#f72585', '#3a0ca3', '#4361ee', '#4cc9f0',
            '#ff9e00', '#ff5d8f', '#90be6d', '#577590',
            '#f94144', '#f3722c', '#f8961e', '#f9844a',
            '#f9c74f', '#90be6d', '#43aa8b', '#4d908e',
            '#577590', '#277da1', '#264653', '#2a9d8f',
            '#e9c46a', '#f4a261', '#e76f51', '#e63946'
        ];

        // 通道重映射表（根据您的要求修正）
        const channelMapping = [
            0,   // 原始0  V0A1  -> CH1 (目标0)
            7,   // 原始1  V0B1  -> CH8 (目标7)
            8,   // 原始2  V1A1  -> CH9 (目标8)
            15,  // 原始3  V1B1  -> CH16 (目标15)
            4,   // 原始4  V2A1  -> CH5 (目标4)
            3,   // 原始5  V2B1  -> CH4 (目标3)
            12,  // 原始6  V3A1  -> CH13 (目标12)
            11,  // 原始7  V3B1  -> CH12 (目标11)
            1,   // 原始8  V4A1  -> CH2 (目标1)
            6,   // 原始9  V4B1  -> CH7 (目标6)
            9,   // 原始10 V5A1  -> CH10 (目标9)
            14,  // 原始11 V5B1  -> CH15 (目标14)
            5,   // 原始12 V6A1  -> CH6 (目标5)
            2,   // 原始13 V6B1  -> CH3 (目标2)
            13,  // 原始14 V7A1  -> CH14 (目标13)
            10,  // 原始15 V7B1  -> CH11 (目标10)
            16,  // 原始16 V0A2  -> CH17 (目标16)
            23,  // 原始17 V0B2  -> CH24 (目标23)
            24,  // 原始18 V1A2  -> CH25 (目标24)
            31,  // 原始19 V1B2  -> CH32 (目标31)
            20,  // 原始20 V2A2  -> CH21 (目标20)
            19,  // 原始21 V2B2  -> CH20 (目标19)
            28,  // 原始22 V3A2  -> CH29 (目标28)
            27,  // 原始23 V3B2  -> CH28 (目标27)
            17,  // 原始24 V4A2  -> CH18 (目标17)
            22,  // 原始25 V4B2  -> CH23 (目标22)
            25,  // 原始26 V5A2  -> CH26 (目标25)
            30,  // 原始27 V5B2  -> CH31 (目标30)
            21,  // 原始28 V6A2  -> CH22 (目标21)
            18,  // 原始29 V6B2  -> CH19 (目标18)
            29,  // 原始30 V7A2  -> CH30 (目标29)
            26   // 原始31 V7B2  -> CH27 (目标26)
        ];

        function initVoltageMetrics() {
            voltageMetrics.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const metric = document.createElement('div');
                metric.className = 'metric-item';
                metric.innerHTML = `
                    <span>CH${i + 1} (mV)</span>
                    <strong id="voltage${i}">--</strong>
                `;
                voltageMetrics.appendChild(metric);
            }
        }

        function supportsWebBluetooth() {
            return navigator.bluetooth && typeof navigator.bluetooth.requestDevice === 'function';
        }

        function log(message) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('p');
            entry.textContent = `[${time}] ${message}`;
            logElement.prepend(entry);
            const maxEntries = 60;
            while (logElement.children.length > maxEntries) {
                logElement.removeChild(logElement.lastChild);
            }
        }

        function updateStatus(connected, text) {
            statusDot.classList.toggle('online', connected);
            statusText.textContent = text;
            connectBtn.textContent = connected ? '断开连接' : '连接蓝牙';
        }

        function startTimer() {
            startTime = Date.now();
            if (timerIntervalId) clearInterval(timerIntervalId);
            timerIntervalId = setInterval(() => {
                if (!startTime) return;
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 1000);
        }

        function stopTimer() {
            if (timerIntervalId) { clearInterval(timerIntervalId); timerIntervalId = null; }
            timerDisplay.textContent = '--:--';
        }

        // 二分查找辅助函数
        function binarySearchFirst(arr, target) {
            let low = 0, high = arr.length - 1;
            while (low <= high) {
                const mid = Math.floor((low + high) / 2);
                if (arr[mid].timestamp < target) {
                    low = mid + 1;
                } else {
                    high = mid - 1;
                }
            }
            return low;
        }

        // 清理超过指定时间窗口的旧数据
        function cleanupOldData(windowMs = STORAGE_WINDOW_MS) {
            const now = Date.now();
            const cutoff = now - windowMs;
            for (let i = 0; i < 32; i++) {
                const arr = channelData[i];
                if (arr.length === 0) continue;
                const startIdx = binarySearchFirst(arr, cutoff);
                if (startIdx > 0) {
                    channelData[i] = arr.slice(startIdx);
                }
            }
        }

        // 创建图表
        function createCharts(mode) {
            charts.forEach(chart => chart.destroy());
            charts = [];
            chartsContainer.innerHTML = '';

            let chartConfigs = [];

            switch (mode) {
                case 'single':
                    for (let i = 0; i < 32; i++) {
                        chartConfigs.push({
                            title: `通道 ${i + 1}`,
                            channels: [i],
                            height: 220
                        });
                    }
                    break;
                case 'group4':
                    for (let group = 0; group < 8; group++) {
                        const startCh = group * 4;
                        chartConfigs.push({
                            title: `通道 ${startCh + 1}-${startCh + 4}`,
                            channels: [startCh, startCh + 1, startCh + 2, startCh + 3],
                            height: 280
                        });
                    }
                    break;
                case 'group8':
                    for (let group = 0; group < 4; group++) {
                        const startCh = group * 8;
                        chartConfigs.push({
                            title: `通道 ${startCh + 1}-${startCh + 8}`,
                            channels: Array(8).fill().map((_, i) => startCh + i),
                            height: 330
                        });
                    }
                    break;
            }

            chartConfigs.forEach((config) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'chart-wrapper';
                wrapper.style.height = `${config.height}px`;

                const title = document.createElement('div');
                title.className = 'chart-title';
                title.textContent = config.title;
                wrapper.appendChild(title);

                const canvas = document.createElement('canvas');
                wrapper.appendChild(canvas);
                chartsContainer.appendChild(wrapper);

                const datasets = config.channels.map(ch => ({
                    label: `CH${ch + 1}`,
                    data: [],
                    borderColor: channelColors[ch],
                    backgroundColor: channelColors[ch] + '20',
                    tension: 0.1,
                    pointRadius: 0,
                    borderWidth: 1
                }));

                const chart = new Chart(canvas, {
                    type: 'line',
                    data: { datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        layout: { padding: { bottom: 25 } },
                        interaction: { intersect: false, mode: 'nearest' },
                        plugins: {
                            legend: { display: config.channels.length <= 8 },
                            tooltip: {
                                callbacks: {
                                    label: (context) => {
                                        const label = context.dataset.label || '';
                                        const y = context.parsed.y.toFixed(3) + 'V';
                                        return `${label}: ${y}`;
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                type: 'linear',
                                position: 'bottom',
                                title: { display: true, text: '时间 (s)' },
                                ticks: { callback: value => value.toFixed(0) + 's' },
                                min: 0,
                                max: 0
                            },
                            y: {
                                beginAtZero: false,
                                ticks: { callback: value => Number(value).toFixed(2) },
                                title: { display: true, text: '电压 (V)' }
                            }
                        }
                    }
                });

                charts.push(chart);
            });
        }

        // 更新所有图表（优化版）
        function updateCharts() {
            if (!startTime) return;

            const now = Date.now();
            const currentMaxTime = (now - startTime) / 1000;
            const displayCutoff = now - DISPLAY_WINDOW_MS;
            const WINDOW_SECONDS = 60;
            let xMin, xMax;
            if (currentMaxTime > WINDOW_SECONDS) {
                xMin = currentMaxTime - WINDOW_SECONDS;
                xMax = currentMaxTime;
            } else {
                xMin = 0;
                xMax = WINDOW_SECONDS;
            }

            // 预计算每个通道的显示数据点
            const displayPointsPerChannel = new Array(32);
            for (let i = 0; i < 32; i++) {
                const channelPoints = channelData[i];
                if (channelPoints.length === 0) {
                    displayPointsPerChannel[i] = [];
                    continue;
                }
                const startIdx = binarySearchFirst(channelPoints, displayCutoff);
                displayPointsPerChannel[i] = channelPoints.slice(startIdx).map(p => ({
                    x: (p.timestamp - startTime) / 1000,
                    y: p.voltage
                }));
            }

            charts.forEach(chart => {
                let allVoltages = [];
                chart.data.datasets.forEach(dataset => {
                    const channelIndex = dataset.label.match(/CH(\d+)/)[1] - 1;
                    const points = displayPointsPerChannel[channelIndex] || [];
                    dataset.data = points;
                    allVoltages = allVoltages.concat(points.map(p => p.y));
                });

                if (allVoltages.length > 0) {
                    let minV = Math.min(...allVoltages);
                    let maxV = Math.max(...allVoltages);
                    const range = maxV - minV;
                    const MIN_RANGE = 0.5;
                    if (range < MIN_RANGE) {
                        const center = (maxV + minV) / 2;
                        minV = center - MIN_RANGE / 2;
                        maxV = center + MIN_RANGE / 2;
                    }
                    const padding = (maxV - minV) * 0.1;
                    chart.options.scales.y.min = minV - padding;
                    chart.options.scales.y.max = maxV + padding;
                } else {
                    chart.options.scales.y.min = undefined;
                    chart.options.scales.y.max = undefined;
                }

                chart.options.scales.x.min = xMin;
                chart.options.scales.x.max = xMax;
                chart.update('none');
            });
        }

        // 处理蓝牙通知数据（纯数据写入，不做任何DOM/图表操作）
        function handleNotification(event) {
            if (isPaused) return;

            const dataView = event.target.value;
            if (dataView.byteLength < 128) {
                // 仅记录，不影响主流程
                log(`数据长度不足：${dataView.byteLength} 字节，期望 128 字节`);
                return;
            }

            const timestamp = Date.now();

            // 解析 32 路 float32（little-endian）
            const mappedVoltages = new Array(32);
            for (let i = 0; i < 32; i++) {
                mappedVoltages[channelMapping[i]] = dataView.getFloat32(i * 4, true);
            }

            // 仅写入数据，不触碰 DOM
            for (let i = 0; i < 32; i++) {
                const voltage = mappedVoltages[i];
                channelData[i].push({ timestamp, voltage: voltage / 1000, voltageMillivolt: voltage });
            }

            // 滑动窗口记录时间戳，用于采样率计算
            sampleTimestamps.push(timestamp);
            if (sampleTimestamps.length > SAMPLE_RATE_WINDOW) sampleTimestamps.shift();

            lastUpdate = timestamp;

            // 有数据后启用导出按钮（用 length===1 只触发一次，避免每帧判断）
            if (channelData[0].length === 1) {
                exportBtn.disabled = false;
            }
        }

        // 使用滑动窗口计算采样率（精确且开销极低）
        function computeSamplingRate() {
            if (sampleTimestamps.length < 2) return;
            const first = sampleTimestamps[0];
            const last = sampleTimestamps[sampleTimestamps.length - 1];
            const durationMs = last - first;
            if (durationMs <= 0) return;
            const frequency = (sampleTimestamps.length - 1) / (durationMs / 1000);
            log(`采样频率：${frequency.toFixed(1)} Hz（最近 ${sampleTimestamps.length} 包）`);
        }

        // ── 渲染循环：以固定 10Hz 节流刷新 UI，与蓝牙数据接收完全解耦 ──
        function startRenderLoop() {
            if (renderLoopId) return;
            renderLoopId = setInterval(renderUI, RENDER_INTERVAL_MS);
        }

        function stopRenderLoop() {
            if (renderLoopId) {
                clearInterval(renderLoopId);
                renderLoopId = null;
            }
        }

        // ── BLE Keep-alive：维持短连接间隔，阻止 OS 省电降速 ──────────────
        function startKeepAlive() {
            stopKeepAlive();
            keepAliveId = setInterval(async () => {
                if (!writeCharacteristic || !device?.gatt?.connected) return;
                try {
                    // 优先用 writeValueWithoutResponse（无需 ACK，开销最小）
                    if (typeof writeCharacteristic.writeValueWithoutResponse === 'function') {
                        await writeCharacteristic.writeValueWithoutResponse(KEEP_ALIVE_PAYLOAD);
                    } else {
                        await writeCharacteristic.writeValue(KEEP_ALIVE_PAYLOAD);
                    }
                } catch (_) { /* 忽略写入错误，不影响主流程 */ }
            }, KEEP_ALIVE_INTERVAL_MS);
        }

        function stopKeepAlive() {
            if (keepAliveId) { clearInterval(keepAliveId); keepAliveId = null; }
        }

        function renderUI() {
            if (!startTime || isPaused) return;

            const now = Date.now();

            // 1. 更新 32 路电压数字显示 + 图表（仅图表模式）
            if (!samplingModeActive) {
                for (let i = 0; i < 32; i++) {
                    const arr = channelData[i];
                    if (arr.length > 0) {
                        const el = document.getElementById(`voltage${i}`);
                        if (el) el.textContent = arr[arr.length - 1].voltageMillivolt.toFixed(1);
                    }
                }
                updateCharts();
            }

            // 2. 定期清理旧数据（每 5 秒一次）
            //    图表模式：只保留60秒；采样模式：保留完整5分钟
            if (now - lastCleanupTime > CLEANUP_INTERVAL_MS) {
                cleanupOldData(samplingModeActive ? SAMPLING_MAX_MS : DISPLAY_WINDOW_MS);
                lastCleanupTime = now;
            }

            // 3. 采样模式：检查是否达到5分钟上限，到时自动停止
            if (samplingModeActive && samplingStartTime !== null) {
                const elapsed = now - samplingStartTime;
                const remaining = SAMPLING_MAX_MS - elapsed;
                if (remaining <= 0) {
                    // 自动停止采样
                    isPaused = true;
                    pauseBtn.textContent = '恢复采样';
                    pauseBtn.classList.remove('secondary');
                    log('采样模式已达到5分钟上限，自动停止。请导出数据。');
                    samplingStartTime = null;
                } else if (remaining <= 30000 && Math.floor(remaining / 1000) % 10 === 0) {
                    // 最后30秒内每10秒提示一次
                    log(`采样模式：剩余 ${Math.ceil(remaining / 1000)} 秒`);
                }
            }

            // 4. 定期输出采样率日志（每 3 秒一次）
            if (now - lastSampleRateLogTime > SAMPLE_LOG_INTERVAL_MS) {
                computeSamplingRate();
                lastSampleRateLogTime = now;
            }
        }

        // 连接蓝牙
        async function connect() {
            if (!supportsWebBluetooth()) {
                log('当前浏览器不支持 Web Bluetooth。');
                alert('当前浏览器不支持 Web Bluetooth, 请尝试使用 Chrome、Edge 或 Android WebView。');
                return;
            }

            try {
                updateStatus(false, '正在搜索设备...');
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [PRIMARY_SERVICE] }],
                    optionalServices: [PRIMARY_SERVICE]
                });

                device.addEventListener('gattserverdisconnected', handleDisconnection);
                updateStatus(false, '正在建立连接...');

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(PRIMARY_SERVICE);
                writeCharacteristic = await service.getCharacteristic(WRITE_CHAR);
                notifyCharacteristic = await service.getCharacteristic(NOTIFY_CHAR);

                await notifyCharacteristic.startNotifications();
                notifyCharacteristic.addEventListener('characteristicvaluechanged', handleNotification);

                for (let i = 0; i < 32; i++) channelData[i] = [];
                sampleTimestamps.length = 0; // 清空滑动窗口
                createCharts(currentViewMode);
                exportBtn.disabled = false;
                startTimer();
                startRenderLoop(); // 启动渲染循环
                startKeepAlive(); // 启动BLE心跳，维持高采样率

                // 连接后默认暂停，需手动恢复
                isPaused = true;
                pauseBtn.textContent = '恢复采样';
                pauseBtn.classList.remove('secondary'); // 蓝色

                // 根据当前采样模式更新UI
                applySamplingModeUI();

                updateStatus(true, `已连接: ${device.name || '未知设备'}`);
                log('蓝牙连接成功，已暂停采样，点击“恢复采样”开始接收数据。');

            } catch (error) {
                log(`连接失败：${error.message}`);
                updateStatus(false, '连接失败，请重试');
                if (device && device.gatt && device.gatt.connected) {
                    device.gatt.disconnect();
                }
            }
        }

        async function disconnect() {
            if (notifyCharacteristic) {
                try { await notifyCharacteristic.stopNotifications(); } catch (error) { log(`停止通知失败：${error.message}`); }
            }
            if (device && device.gatt && device.gatt.connected) {
                device.gatt.disconnect();
            }
            notifyCharacteristic = null;
            writeCharacteristic = null;
            updateStatus(false, '已断开连接');
            stopRenderLoop();
            stopKeepAlive();
            stopTimer();
            exportBtn.disabled = true;
            log('蓝牙连接已断开。');
        }

        function handleDisconnection() {
            updateStatus(false, '已断开连接');
            log('蓝牙连接已断开。');
            stopRenderLoop();
            stopKeepAlive();
            stopTimer();
        }

        // 清除所有缓存和显示数据（重置计时）
        function clearAllData() {
            for (let i = 0; i < 32; i++) channelData[i] = [];
            sampleTimestamps.length = 0; // 重置采样率滑动窗口
            samplingStartTime = null;    // 重置采样开始时间
            for (let i = 0; i < 32; i++) {
                const voltageElement = document.getElementById(`voltage${i}`);
                if (voltageElement) voltageElement.textContent = '--';
            }
            startTime = Date.now();
            lastUpdate = 0;
            // 清除后默认暂停
            isPaused = true;
            pauseBtn.textContent = '恢复采样';
            pauseBtn.classList.remove('secondary'); // 蓝色
            charts.forEach(chart => {
                chart.data.datasets.forEach(dataset => dataset.data = []);
                chart.update('none');
            });
            exportBtn.disabled = true;
            log('已清除所有缓存和显示数据，时间从当前重新开始，采样暂停');
        }

        function togglePause() {
            if (!device || !device.gatt || !device.gatt.connected) {
                log('未连接设备，无法暂停');
                return;
            }
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.textContent = '恢复采样';
                pauseBtn.classList.remove('secondary'); // 蓝色
                log('采样已暂停');
            } else {
                pauseBtn.textContent = '暂停采样';
                pauseBtn.classList.add('secondary'); // 红色
                lastCleanupTime = Date.now();
                lastSampleRateLogTime = Date.now();
                log('采样已恢复');
            }
        }

        // 导出数据（兼容手机端，根据采样模式决定导出范围）
        function exportData() {
            if (typeof XLSX === 'undefined') {
                alert('导出功能不可用：未加载 XLSX 库。');
                return;
            }

            // 图表模式：导出当前缓存的60秒数据；采样模式：导出全部已记录数据
            const cutoff = samplingModeActive ? 0 : (Date.now() - DISPLAY_WINDOW_MS);

            const timeSet = new Set();
            const channelSamples = channelData.map(channel => {
                return channel.filter(item => item.timestamp >= cutoff);
            });

            channelSamples.forEach(samples => samples.forEach(sample => timeSet.add(sample.timestamp)));
            const sortedTimes = Array.from(timeSet).sort((a, b) => a - b);

            if (sortedTimes.length === 0) {
                log(samplingModeActive ? '采样模式下无数据可导出。' : '最近60秒内无数据可导出。');
                return;
            }

            const rows = sortedTimes.map(timestamp => {
                const row = {
                    '时间': new Date(timestamp).toLocaleString('zh-CN', {
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    }),
                    '时间戳': timestamp
                };
                for (let i = 0; i < 32; i++) {
                    const sample = channelSamples[i].find(s => s.timestamp === timestamp);
                    row[`CH${i + 1} (mV)`] = sample ? sample.voltageMillivolt.toFixed(1) : '';
                    row[`CH${i + 1} (V)`] = sample ? (sample.voltageMillivolt / 1000).toFixed(4) : '';
                }
                return row;
            });

            const headers = ['时间', '时间戳'];
            for (let i = 0; i < 32; i++) headers.push(`CH${i + 1} (mV)`, `CH${i + 1} (V)`);

            const worksheet = XLSX.utils.json_to_sheet(rows, { header: headers });
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, '32通道电压数据');

            const timestampLabel = new Date().toISOString().replace(/[:.]/g, '-');
            const filename = `32ch_adc_${timestampLabel}.xlsx`;

            try {
                const wbout = XLSX.write(workbook, { bookType: 'xlsx', type: 'binary' });
                function s2ab(s) {
                    const buf = new ArrayBuffer(s.length);
                    const view = new Uint8Array(buf);
                    for (let i = 0; i < s.length; i++) view[i] = s.charCodeAt(i) & 0xFF;
                    return buf;
                }
                const buf = s2ab(wbout);
                const blob = new Blob([buf], { type: 'application/octet-stream' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

                const modeText = samplingModeActive ? '采样模式' : '普通模式';
                log(`数据已导出为 ${filename}，包含 ${sortedTimes.length} 个采样点 (${modeText})`);
            } catch (e) {
                console.error('导出失败', e);
                log('导出失败，请重试或检查浏览器兼容性');
            }
        }

        // 应用采样模式UI变化
        function applySamplingModeUI() {
            if (samplingModeActive) {
                voltageMetrics.classList.add('hidden');
                chartsContainer.classList.add('hidden');
                viewModeBtns.forEach(btn => btn.disabled = true);
                samplingModeBtn.textContent = '退出采样';
                samplingHint.classList.remove('hidden');
                log('已进入采样模式，最多记录5分钟数据，图表已隐藏，采样自动开始');
            } else {
                voltageMetrics.classList.remove('hidden');
                chartsContainer.classList.remove('hidden');
                viewModeBtns.forEach(btn => btn.disabled = false);
                samplingModeBtn.textContent = '采样模式';
                samplingHint.classList.add('hidden');
                if (device && device.gatt && device.gatt.connected) {
                    createCharts(currentViewMode);
                    updateCharts();
                }
                log('已退出采样模式，恢复图表显示（仅保留最近60秒数据）');
            }
        }

        // 切换采样模式
        function toggleSamplingMode() {
            if (!device || !device.gatt || !device.gatt.connected) {
                log('请先连接设备');
                return;
            }
            samplingModeActive = !samplingModeActive;

            if (samplingModeActive) {
                clearAllData(); // 清空数据并重置计时
                exportBtn.disabled = false;
                samplingStartTime = Date.now(); // 记录采样开始时间
                // 进入采样模式后自动恢复采样（无需手动点恢复）
                isPaused = false;
                pauseBtn.textContent = '暂停采样';
                pauseBtn.classList.add('secondary');
            } else {
                samplingStartTime = null;
            }

            applySamplingModeUI();
        }

        function setViewMode(mode) {
            if (samplingModeActive) {
                log('采样模式下不能切换显示模式');
                return;
            }
            currentViewMode = mode;
            viewModeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            if (device && device.gatt && device.gatt.connected) {
                createCharts(mode);
                updateCharts();
                log(`切换显示模式为: ${getModeName(mode)}`);
            } else {
                createCharts(mode);
            }
        }

        function getModeName(mode) {
            const names = { 'single': '单通道显示', 'group4': '4通道一组', 'group8': '8通道一组' };
            return names[mode] || mode;
        }

        // 事件监听
        connectBtn.addEventListener('click', async () => {
            if (device && device.gatt && device.gatt.connected) {
                await disconnect();
            } else {
                connectBtn.disabled = true;
                await connect();
                connectBtn.disabled = false;
            }
        });

        exportBtn.addEventListener('click', exportData);
        pauseBtn.addEventListener('click', togglePause);
        clearBtn.addEventListener('click', () => {
            if (confirm('确定要清除所有缓存和显示数据吗？此操作不可撤销。')) {
                clearAllData();
            }
        });

        viewModeBtns.forEach(btn => {
            btn.addEventListener('click', () => setViewMode(btn.dataset.mode));
        });

        samplingModeBtn.addEventListener('click', toggleSamplingMode);

        // 初始化
        initVoltageMetrics();
        createCharts(currentViewMode);
        log('32通道ADC电压监测系统已就绪');
    </script>
</body>
